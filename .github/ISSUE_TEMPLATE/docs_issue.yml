name: Docs issue
description: Report incorrect, missing, or unclear documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or name the document and section.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong, missing, or unclear?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected wording or behavior
      description: What should the documentation say?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aquote-router version
      placeholder: "0.2.0"
  - type: textarea
    id: diagnose
    attributes:
      label: diagnose --json output
      description: Optional sanitized output if the docs issue is environment-specific.
  - type: input
    id: trace_id
    attributes:
      label: trace_id
      description: Optional trace_id if the docs issue relates to a failed request.
