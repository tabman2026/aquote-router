name: Bug report
description: Report a reproducible aquote-router bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or Python code.
      placeholder: |
        aquote-router diagnose --json
        aquote-router realtime 000001
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aquote-router version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: command
      description: Paste the exact CLI command or minimal Python call.
      placeholder: "aquote-router realtime 000001 --json"
    validations:
      required: true
  - type: input
    id: api_name
    attributes:
      label: API name
      placeholder: "realtime_quotes / minute_kline / daily_kline / kline"
    validations:
      required: true
  - type: input
    id: symbol
    attributes:
      label: symbol
      placeholder: "000001"
  - type: input
    id: period_count
    attributes:
      label: period/count
      placeholder: "period=15m, count=120; write N/A if not kline"
  - type: input
    id: trace_id
    attributes:
      label: trace_id
      description: Paste the trace_id if the bug happened during a quote request.
  - type: textarea
    id: diagnose
    attributes:
      label: diagnose --json output
      description: Paste sanitized output from aquote-router diagnose --json. Do not include token, cookie, secret, account data, or private paths.
    validations:
      required: true
  - type: textarea
    id: audit
    attributes:
      label: Sanitized audit log snippet
      description: Paste relevant sanitized JSONL or SQLite fields if available.
  - type: textarea
    id: probe_pytdx
    attributes:
      label: probe-pytdx output
      description: Required for K-line timeout reports; write N/A for unrelated bugs.
